<template>
  <lightning-card class="admin-card">
    <template if:true={showSummaryView}>
      <div class="hero">
        <div>
          <p class="eyebrow">Heuristic Duplicate Scanner</p>
          <h1 class="title">Manual Admin Scan (Any Object, Same-Object Matching)</h1>
        </div>
        <div class="hero-actions">
          <lightning-button label="Refresh" onclick={handleRefresh}></lightning-button>
          <template if:true={showCancelButton}>
            <lightning-button
              label="Cancel Running Scan"
              variant="destructive-text"
              onclick={handleCancel}
              disabled={loading}
            ></lightning-button>
          </template>
        </div>
      </div>

      <section class="controls">
        <lightning-combobox
          name="objectPicker"
          label="Object"
          value={selectedObject}
          options={objectOptions}
          onchange={handleObjectChange}
        ></lightning-combobox>
        <lightning-input
          type="number"
          label="Max Records"
          min="100"
          max="5000"
          value={maxRecords}
          onchange={handleMaxRecordsChange}
        ></lightning-input>
        <lightning-input
          type="number"
          label="Score Threshold (0-100)"
          min="0"
          max="100"
          value={scoreThreshold}
          onchange={handleThresholdChange}
        ></lightning-input>
        <lightning-input
          type="checkbox"
          label="Clear previous results for selected object"
          checked={clearPreviousFlags}
          onchange={handleClearFlagsChange}
        ></lightning-input>
        <lightning-button
          label="Run Duplicate Scan"
          variant="brand"
          onclick={handleRunNow}
          disabled={disableRunButton}
        ></lightning-button>
      </section>

      <template if:true={loading}>
        <div class="loading-shell">
          <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </div>
      </template>

      <template if:true={hasStatus}>
        <section class="status-panel">
          <div class="status-header">
            <h2>Selected Scan: {scanStatus.scanName}</h2>
            <span class={statusBadgeClass}>{scanStatus.status}</span>
          </div>
          <div class="metrics">
            <div class="metric"><span>Object</span><strong>{scanStatus.objectNameLabel}</strong></div>
            <div class="metric"><span>Created</span><strong>{scanStatus.createdDateLabel}</strong></div>
            <div class="metric"><span>Started</span><strong>{scanStatus.startedAtLabel}</strong></div>
            <div class="metric"><span>Completed</span><strong>{scanStatus.completedAtLabel}</strong></div>
            <div class="metric"><span>Last Heartbeat</span><strong>{scanStatus.heartbeatLabel}</strong></div>
            <div class="metric"><span>Processed / Total</span><strong>{scanStatus.processedRecords} / {scanStatus.totalRecords}</strong></div>
            <div class="metric"><span>Candidate Pairs</span><strong>{scanStatus.candidatePairs}</strong></div>
            <div class="metric"><span>Flagged Records</span><strong>{scanStatus.flaggedRecords}</strong></div>
            <div class="metric"><span>Flagged Groups</span><strong>{scanStatus.flaggedGroups}</strong></div>
            <div class="metric"><span>Threshold</span><strong>{scanStatus.threshold}</strong></div>
            <div class="metric"><span>Max Records</span><strong>{scanStatus.maxRecords}</strong></div>
          </div>
          <template if:true={scanStatus.errorMessage}>
            <p class="error-text">{scanStatus.errorMessage}</p>
          </template>
        </section>
      </template>

      <section class="recent-section">
        <h2>Recent Scans</h2>
        <template if:true={hasRecentScans}>
          <div class="recent-list">
            <template for:each={recentScans} for:item="scan">
              <button
                key={scan.scanId}
                class="recent-item"
                data-scan-id={scan.scanId}
                onclick={handleSelectRecent}
              >
                <span class="scan-name">{scan.scanName}</span>
                <span class="scan-meta">{scan.objectNameLabel}</span>
                <span class="scan-meta">{scan.createdDateLabel}</span>
                <span class="scan-meta">{scan.statusLabel}</span>
                <span class="scan-meta">Groups: {scan.flaggedGroups} | Records: {scan.flaggedRecords}</span>
              </button>
            </template>
          </div>
        </template>
        <template if:false={hasRecentScans}>
          <p class="empty-text">No scans found yet.</p>
        </template>
      </section>

      <section class="groups-section">
        <h2>Flagged Duplicate Groups</h2>
        <template if:true={hasGroups}>
          <lightning-accordion allow-multiple-sections-open>
            <template for:each={groups} for:item="group">
              <lightning-accordion-section
                key={group.groupKey}
                name={group.groupKey}
                label={group.sectionLabel}
              >
                <p class="group-summary">{group.summary}</p>
                <div class="group-actions">
                  <lightning-button
                    label="View Detail"
                    data-group-id={group.groupId}
                    onclick={handleOpenDetail}
                  ></lightning-button>
                </div>
                <lightning-datatable
                  key-field="recordId"
                  data={group.records}
                  columns={groupColumns}
                  hide-checkbox-column
                ></lightning-datatable>
              </lightning-accordion-section>
            </template>
          </lightning-accordion>
        </template>
        <template if:false={hasGroups}>
          <p class="empty-text">No flagged groups for this scan.</p>
        </template>
      </section>

      <section class="groups-section">
        <h2>Merged Duplicate Groups</h2>
        <template if:true={hasMergedGroups}>
          <lightning-accordion allow-multiple-sections-open>
            <template for:each={mergedGroups} for:item="group">
              <lightning-accordion-section
                key={group.mergeRunId}
                name={group.mergeRunId}
                label={group.sectionLabel}
              >
                <p class="group-summary">{group.summary}</p>
                <div class="metrics">
                  <div class="metric"><span>Status</span><strong>{group.status}</strong></div>
                  <div class="metric"><span>Merged At</span><strong>{group.createdDateLabel}</strong></div>
                  <div class="metric"><span>Updated Fields</span><strong>{group.updatedFieldCount}</strong></div>
                  <div class="metric"><span>Reparented</span><strong>{group.reparentedRecordCount}</strong></div>
                  <div class="metric"><span>Merged Records</span><strong>{group.mergedRecordCount}</strong></div>
                  <div class="metric">
                    <span>Survivor</span>
                    <strong>
                      <a href={group.survivorUrl} target="_blank" rel="noopener noreferrer">
                        {group.survivorDisplayValue}
                      </a>
                    </strong>
                  </div>
                </div>
                <template if:true={group.warnings}>
                  <p class="error-text">{group.warnings}</p>
                </template>
                <lightning-datatable
                  key-field="sourceRecordId"
                  data={group.mergedRecords}
                  columns={mergedRecordColumns}
                  hide-checkbox-column
                ></lightning-datatable>
              </lightning-accordion-section>
            </template>
          </lightning-accordion>
        </template>
        <template if:false={hasMergedGroups}>
          <p class="empty-text">No merged groups for this scan.</p>
        </template>
      </section>
    </template>

    <template if:true={showDetailView}>
      <section class="detail-page">
        <div class="detail-header">
          <lightning-button label="Back" icon-name="utility:back" onclick={handleBackToSummary}></lightning-button>
          <div>
            <p class="eyebrow">Group Detail</p>
            <h2 class="title">{detailGroup.groupKey}</h2>
            <p class="group-summary">{detailGroup.summary}</p>
          </div>
        </div>

        <template if:true={showDetailComparison}>
          <div class="detail-actions">
            <template if:true={detailGroup.canMergeUi}>
              <lightning-button label="Select Survivor" onclick={handleSelectParentClick}></lightning-button>
              <lightning-button
                label="Review Merge"
                variant="brand"
                disabled={detailGroup.mergeDisabled}
                onclick={handleReviewMerge}
              ></lightning-button>
            </template>
          </div>

          <lightning-datatable
            key-field="recordId"
            data={detailGroup.records}
            columns={detailColumns}
            data-group-id={detailGroup.groupId}
            onrowselection={handleDetailRowSelection}
          ></lightning-datatable>

          <div class="record-links">
            <span class="record-links-label">Open Records</span>
            <template for:each={detailGroup.recordLinks} for:item="recordLink">
              <a
                key={recordLink.recordId}
                class="record-link"
                href={recordLink.recordUrl}
                target="_blank"
                rel="noopener noreferrer"
              >
                {recordLink.linkLabel}
              </a>
            </template>
          </div>

          <div class="matrix-wrap detail-matrix-wrap">
            <table class="field-matrix">
              <thead>
                <tr>
                  <th>Field</th>
                  <template for:each={detailGroup.records} for:item="recordCol">
                    <th key={recordCol.recordId}>{recordCol.displayValue}</th>
                  </template>
                </tr>
              </thead>
              <tbody>
                <template for:each={detailGroup.detailFieldRows} for:item="row">
                  <tr key={row.name}>
                    <td class="field-name">{row.name}</td>
                    <template for:each={row.values} for:item="val">
                      <td key={val.recordId} class={val.cellClass} title={val.fullValue}>{val.displayValue}</td>
                    </template>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>

        <c-merge-resolution-workspace
          proposal={mergeReview}
          loading={mergeLoading}
          executing={mergeExecuting}
          visible={mergeReviewVisible}
          onselectionchange={handleMergeSelectionChange}
          onexecute={handleExecuteMerge}
          onclose={handleMergeReviewClose}
          onselectsurvivor={handleSelectSurvivorFromReview}
        ></c-merge-resolution-workspace>
      </section>
    </template>

    <template if:true={parentPickerOpen}>
      <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
          <header class="slds-modal__header">
            <h2 class="slds-text-heading_medium">Select Survivor Record</h2>
          </header>
          <div class="slds-modal__content slds-p-around_medium">
            <lightning-radio-group
              name="parentPicker"
              label="Survivor record"
              options={parentOptions}
              value={selectedParentCandidate}
              type="radio"
              onchange={handleParentCandidateChange}
            ></lightning-radio-group>
          </div>
          <footer class="slds-modal__footer">
            <lightning-button label="Cancel" onclick={handleParentPickerCancel}></lightning-button>
            <lightning-button variant="brand" label="Set Survivor" onclick={handleParentPickerConfirm}></lightning-button>
          </footer>
        </div>
      </section>
      <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
  </lightning-card>
</template>
