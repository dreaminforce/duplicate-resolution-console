<template>
  <lightning-card class="workbench-card">
    <template if:true={showSummaryView}>
      <div class="hero">
        <div>
          <p class="eyebrow">Matching &amp; Duplicate Rule Workbench</p>
          <h1 class="title">Resolve duplicate rule sets with ranked merge guidance</h1>
        </div>
        <div class="toolbar">
          <lightning-combobox
            name="objectPicker"
            label="Object"
            value={selectedObject}
            options={objectOptions}
            onchange={handleObjectChange}
          ></lightning-combobox>
          <div class="toolbar-actions">
            <lightning-button label="View Duplicate Rule Sets" onclick={handleViewDuplicates}></lightning-button>
            <lightning-button label="Analyze All Sets (AI)" variant="brand" onclick={handleAnalyzeAi}></lightning-button>
          </div>
        </div>
      </div>

      <template if:true={loading}>
        <div class="loading-shell">
          <lightning-spinner alternative-text="Analyzing duplicate rule sets" size="small"></lightning-spinner>
        </div>
      </template>

      <template if:true={summary}>
        <section class="summary-grid">
          <article class="metric">
            <p class="metric-label">Object</p>
            <p class="metric-value">{summary.objectLabel}</p>
          </article>
          <article class="metric">
            <p class="metric-label">Mode</p>
            <p class="metric-value">{modeLabel}</p>
          </article>
          <article class="metric">
            <p class="metric-label">Duplicate Sets</p>
            <p class="metric-value">{summary.totalSets}</p>
          </article>
          <article class="metric">
            <p class="metric-label">Duplicate Items</p>
            <p class="metric-value">{summary.totalItems}</p>
          </article>
          <article class="metric">
            <p class="metric-label">Fields Loaded</p>
            <p class="metric-value">{summary.totalFields}</p>
          </article>
        </section>
      </template>

      <template if:true={warnings}>
        <template for:each={warnings} for:item="warning">
          <div class="warning" key={warning}>{warning}</div>
        </template>
      </template>

      <template if:true={hasData}>
        <lightning-accordion allow-multiple-sections-open>
          <template for:each={sets} for:item="setItem">
            <lightning-accordion-section key={setItem.duplicateRecordSetId} name={setItem.duplicateRecordSetId} label={setItem.sectionLabel}>
              <div class="set-header">
                <div class="set-meta">
                  <template if:true={setItem.effectiveParentId}>
                    <p class="set-parent">Parent: {setItem.effectiveParentDisplay}</p>
                  </template>
                  <p class="set-summary">{setItem.summaryShort}</p>
                </div>
              </div>
              <div class="set-actions compact-actions">
                <lightning-button
                  label="View Detail"
                  data-set-id={setItem.duplicateRecordSetId}
                  onclick={handleOpenDetail}
                ></lightning-button>
                <lightning-button
                  label="Analyze Set (AI)"
                  variant="brand-outline"
                  data-set-id={setItem.duplicateRecordSetId}
                  onclick={handleAnalyzeSingleSetAi}
                ></lightning-button>
                <template if:true={setItem.canMergeUi}>
                  <lightning-button
                    label="Select Survivor"
                    data-set-id={setItem.duplicateRecordSetId}
                    onclick={handleSelectParentClick}
                  ></lightning-button>
                  <lightning-button
                    label="Review Merge"
                    variant="brand"
                    disabled={setItem.mergeDisabled}
                    data-set-id={setItem.duplicateRecordSetId}
                    onclick={handleReviewMerge}
                  ></lightning-button>
                </template>
                <lightning-button
                  label="Delete"
                  variant="destructive-text"
                  data-set-id={setItem.duplicateRecordSetId}
                  onclick={handleDeleteClick}
                ></lightning-button>
              </div>

              <lightning-datatable
                key-field="recordId"
                data={setItem.records}
                columns={columns}
                data-set-id={setItem.duplicateRecordSetId}
                onrowselection={handleRowSelection}
              ></lightning-datatable>
            </lightning-accordion-section>
          </template>
        </lightning-accordion>
      </template>
    </template>

    <template if:true={showDetailView}>
      <section class="detail-page">
        <div class="detail-header">
          <lightning-button label="Back" icon-name="utility:back" onclick={handleBackToSummary}></lightning-button>
          <div>
            <p class="eyebrow">Detailed Analysis</p>
            <h2 class="title">{detailSet.duplicateRecordSetName}</h2>
            <p class="set-summary">{detailSet.summary}</p>
          </div>
        </div>

        <div class="set-actions detail-actions">
          <template if:true={detailSet.canMergeUi}>
            <lightning-button
              label="Select Survivor"
              data-set-id={detailSet.duplicateRecordSetId}
              onclick={handleSelectParentClick}
            ></lightning-button>
            <lightning-button
              label="Review Merge"
              variant="brand"
              disabled={detailSet.mergeDisabled}
              data-set-id={detailSet.duplicateRecordSetId}
              onclick={handleReviewMerge}
            ></lightning-button>
          </template>
          <lightning-button
            label="Delete Selected"
            variant="destructive-text"
            data-set-id={detailSet.duplicateRecordSetId}
            onclick={handleDeleteClick}
          ></lightning-button>
        </div>

        <lightning-datatable
          key-field="recordId"
          data={detailSet.records}
          columns={columns}
          data-set-id={detailSet.duplicateRecordSetId}
          onrowselection={handleRowSelection}
        ></lightning-datatable>

        <div class="matrix-wrap detail-matrix-wrap">
          <table class="field-matrix">
            <thead>
              <tr>
                <th>Field</th>
                <template for:each={detailSet.records} for:item="recordCol">
                  <th key={recordCol.recordId}>{recordCol.displayValue}</th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template for:each={detailSet.detailFieldRows} for:item="row">
                <tr key={row.name}>
                  <td class="field-name">{row.name}</td>
                  <template for:each={row.values} for:item="val">
                    <td key={val.recordId} class={val.cellClass}>{val.value}</td>
                  </template>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <c-merge-resolution-workspace
          proposal={mergeReview}
          loading={mergeLoading}
          executing={mergeExecuting}
          onselectionchange={handleMergeSelectionChange}
          onexecute={handleExecuteMerge}
          onclose={handleMergeReviewClose}
          onselectsurvivor={handleSelectSurvivorFromReview}
        ></c-merge-resolution-workspace>
      </section>
    </template>

    <template if:true={parentPickerOpen}>
      <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
          <header class="slds-modal__header">
            <h2 class="slds-text-heading_medium">Select Survivor Record</h2>
          </header>
          <div class="slds-modal__content slds-p-around_medium">
            <lightning-radio-group
              name="parentPicker"
              label="Survivor record"
              options={parentOptions}
              value={selectedParentCandidate}
              type="radio"
              onchange={handleParentCandidateChange}
            ></lightning-radio-group>
          </div>
          <footer class="slds-modal__footer">
            <lightning-button label="Cancel" onclick={handleParentPickerCancel}></lightning-button>
            <lightning-button variant="brand" label="Set Survivor" onclick={handleParentPickerConfirm}></lightning-button>
          </footer>
        </div>
      </section>
      <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
  </lightning-card>
</template>
